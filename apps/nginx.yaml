apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argo-test
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: argo-test
  source:
    repoURL: https://github.com/RobertFloor/nginx-gitops.git
    targetRevision: main
    path: manifests/nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
