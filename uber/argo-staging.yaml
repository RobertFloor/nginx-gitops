apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-staging
  namespace: argo-staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: argo-staging
  source:
    repoURL: https://github.com/RobertFloor/nginx-gitops.git
    targetRevision: main
    path: environments/argo-staging
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
