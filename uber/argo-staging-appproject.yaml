apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: argo-staging
  namespace: argo-staging
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: Project for argo-staging environment
  sourceRepos:
    - https://github.com/RobertFloor/nginx-gitops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argo-staging
    - server: https://kubernetes.default.svc
      namespace: nginx-staging
