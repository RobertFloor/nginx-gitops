apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: argo-root
  namespace: argo-root
spec:
  description: Root project — bootstraps argo-test and argo-staging environments
  sourceRepos:
    - https://github.com/RobertFloor/nginx-gitops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argo-root
    - server: https://kubernetes.default.svc
      namespace: argo-test
    - server: https://kubernetes.default.svc
      namespace: argo-staging
