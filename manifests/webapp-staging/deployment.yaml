apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: nginx-staging
  labels:
    app: webapp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      securityContext:
        runAsNonRoot: true
      volumes:
        - name: app-script
          configMap:
            name: webapp-script
      containers:
        - name: webapp
          image: python:3.11-slim
          command: ["python", "/app/app.py"]
          env:
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: app-script
              mountPath: /app
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
